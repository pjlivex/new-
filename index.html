<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Games Hub - Play Classic Games Online</title>
  <meta name="description" content="Play 15+ classic HTML5 games online for free. Snake, Tetris, Pong, and more with leaderboards and favorites.">
  <meta name="keywords" content="games, html5 games, retro games, online games, snake, tetris, pong">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
</head>
<body>
  <header>
    <nav>
      <div class="logo">Retro Games Hub</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><button id="theme-toggle">🌙</button></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search games...">

    <section class="section" id="recently-played">
      <!-- Recently played will be populated by JS -->
    </section>

    <div class="ad-placeholder">
      <p>Advertisement Space</p>
      <p>728x90 Banner Ad</p>
    </div>
  </main>

  <footer>
    <p>&copy; 2024 Retro Games Hub. <a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms of Service</a></p>
