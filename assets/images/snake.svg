<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="snakeBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81C784;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="apple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF5722;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF7043;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D84315;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="shine" cx="30%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Bright background -->
  <rect width="100" height="100" fill="#0a0a0a" rx="10"/>

  <!-- Snake body with brighter colors -->
  <rect x="20" y="40" width="8" height="8" fill="url(#snakeBody)" stroke="#2E7D32" stroke-width="1" rx="2"/>
  <rect x="28" y="40" width="8" height="8" fill="url(#snakeBody)" stroke="#2E7D32" stroke-width="1" rx="2"/>
  <rect x="36" y="40" width="8" height="8" fill="url(#snakeBody)" stroke="#2E7D32" stroke-width="1" rx="2"/>
  <rect x="44" y="40" width="8" height="8" fill="url(#snakeBody)" stroke="#2E7D32" stroke-width="1" rx="2"/>
  <rect x="52" y="40" width="8" height="8" fill="url(#snakeBody)" stroke="#2E7D32" stroke-width="1" rx="2"/>
  <rect x="52" y="32" width="8" height="8" fill="url(#snakeBody)" stroke="#2E7D32" stroke-width="1" rx="2"/>
  <rect x="52" y="24" width="8" height="8" fill="url(#snakeBody)" stroke="#2E7D32" stroke-width="1" rx="2"/>

  <!-- Snake head with eyes and shine -->
  <rect x="60" y="24" width="8" height="8" fill="#66BB6A" stroke="#388E3C" stroke-width="1" rx="2"/>
  <rect x="60" y="24" width="8" height="8" fill="url(#shine)" opacity="0.6" rx="2"/>
  <circle cx="62" cy="26" r="1.5" fill="#000"/>
  <circle cx="66" cy="26" r="1.5" fill="#000"/>
  <circle cx="62.5" cy="25.5" r="0.5" fill="#fff"/>
  <circle cx="66.5" cy="25.5" r="0.5" fill="#fff"/>

  <!-- Apple with shine -->
  <circle cx="30" cy="60" r="7" fill="url(#apple)" stroke="#BF360C" stroke-width="1"/>
  <circle cx="30" cy="60" r="7" fill="url(#shine)" opacity="0.4"/>
  <rect x="27" y="57" width="6" height="3" fill="#2E7D32" rx="1"/>
  <circle cx="30" cy="55" r="1.5" fill="#1B5E20"/>
  
  <!-- Apple shine -->
  <circle cx="28" cy="58" r="1" fill="#fff" opacity="0.8"/>
</svg>
