<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Bright background -->
  <rect width="100" height="100" fill="#1a1a1a" rx="10"/>
  
  <!-- Chess board with brighter colors -->
  <rect x="10" y="10" width="80" height="80" fill="#f0d9b5" stroke="#daa520" stroke-width="3" rx="5"/>
  
  <!-- Dark squares - brighter -->
  <rect x="10" y="10" width="10" height="10" fill="#8b4513"/>
  <rect x="30" y="10" width="10" height="10" fill="#8b4513"/>
  <rect x="50" y="10" width="10" height="10" fill="#8b4513"/>
  <rect x="70" y="10" width="10" height="10" fill="#8b4513"/>
  
  <rect x="20" y="20" width="10" height="10" fill="#8b4513"/>
  <rect x="40" y="20" width="10" height="10" fill="#8b4513"/>
  <rect x="60" y="20" width="10" height="10" fill="#8b4513"/>
  <rect x="80" y="20" width="10" height="10" fill="#8b4513"/>
  
  <rect x="10" y="30" width="10" height="10" fill="#8b4513"/>
  <rect x="30" y="30" width="10" height="10" fill="#8b4513"/>
  <rect x="50" y="30" width="10" height="10" fill="#8b4513"/>
  <rect x="70" y="30" width="10" height="10" fill="#8b4513"/>
  
  <rect x="20" y="40" width="10" height="10" fill="#8b4513"/>
  <rect x="40" y="40" width="10" height="10" fill="#8b4513"/>
  <rect x="60" y="40" width="10" height="10" fill="#8b4513"/>
  <rect x="80" y="40" width="10" height="10" fill="#8b4513"/>
  
  <!-- Light squares with subtle pattern -->
  <defs>
    <pattern id="lightSquare" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#f5f5dc"/>
      <circle cx="5" cy="5" r="0.5" fill="#daa520" opacity="0.3"/>
    </pattern>
  </defs>
  <rect x="20" y="10" width="10" height="10" fill="url(#lightSquare)"/>
  <rect x="40" y="10" width="10" height="10" fill="url(#lightSquare)"/>
  <rect x="60" y="10" width="10" height="10" fill="url(#lightSquare)"/>
  <rect x="80" y="10" width="10" height="10" fill="url(#lightSquare)"/>
  
  <rect x="10" y="20" width="10" height="10" fill="url(#lightSquare)"/>
  <rect x="30" y="20" width="10" height="10" fill="url(#lightSquare)"/>
  <rect x="50" y="20" width="10" height="10" fill="url(#lightSquare)"/>
  <rect x="70" y="20" width="10" height="10" fill="url(#lightSquare)"/>
  
  <rect x="20" y="30" width="10" height="10" fill="url(#lightSquare)"/>
  <rect x="40" y="30" width="10" height="10" fill="url(#lightSquare)"/>
  <rect x="60" y="30" width="10" height="10" fill="url(#lightSquare)"/>
  <rect x="80" y="30" width="10" height="10" fill="url(#lightSquare)"/>
  
  <rect x="10" y="40" width="10" height="10" fill="url(#lightSquare)"/>
  <rect x="30" y="40" width="10" height="10" fill="url(#lightSquare)"/>
  <rect x="50" y="40" width="10" height="10" fill="url(#lightSquare)"/>
  <rect x="70" y="40" width="10" height="10" fill="url(#lightSquare)"/>
  
  <!-- Chess pieces with better positioning -->
  <!-- White king -->
  <text x="45" y="85" font-family="Arial" font-size="14" fill="#ffffff" stroke="#f0f0f0" stroke-width="0.5">♔</text>
  <!-- Black queen -->
  <text x="55" y="25" font-family="Arial" font-size="14" fill="#000000" stroke="#333" stroke-width="0.5">♛</text>
  <!-- White pawn -->
  <text x="35" y="75" font-family="Arial" font-size="12" fill="#ffffff" stroke="#f0f0f0" stroke-width="0.5">♙</text>
  <!-- Black pawn -->
  <text x="65" y="35" font-family="Arial" font-size="12" fill="#000000" stroke="#333" stroke-width="0.5">♟</text>
  
  <!-- Subtle glow for pieces -->
  <circle cx="45" cy="78" r="8" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <circle cx="55" cy="18" r="8" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
</svg>
