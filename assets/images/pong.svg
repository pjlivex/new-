<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Bright background -->
  <rect width="100" height="100" fill="#0a0a0a" rx="10"/>
  
  <!-- Table with bright green -->
  <rect x="5" y="5" width="90" height="90" fill="#22c55e" stroke="#16a34a" stroke-width="3" rx="8"/>
  
  <!-- Center line - brighter -->
  <line x1="50" y1="5" x2="50" y2="95" stroke="#ffffff" stroke-width="3" stroke-dasharray="8,8"/>
  
  <!-- Left paddle - bright white -->
  <rect x="10" y="30" width="6" height="45" fill="#ffffff" stroke="#f0f0f0" stroke-width="1" rx="3"/>
  <rect x="10" y="30" width="6" height="45" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.8"/>
  
  <!-- Right paddle - bright white -->
  <rect x="84" y="35" width="6" height="45" fill="#ffffff" stroke="#f0f0f0" stroke-width="1" rx="3"/>
  <rect x="84" y="35" width="6" height="45" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.8"/>
  
  <!-- Ball - bright white with glow -->
  <circle cx="50" cy="50" r="5" fill="#ffffff"/>
  <circle cx="50" cy="50" r="5" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
  
  <!-- Ball trail - brighter -->
  <circle cx="43" cy="43" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="36" cy="36" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="29" cy="29" r="1" fill="#ffffff" opacity="0.4"/>
  
  <!-- Score indicators -->
  <text x="25" y="20" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ffffff">5</text>
  <text x="75" y="20" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ffffff">3</text>
</svg>
