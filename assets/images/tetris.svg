<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Bright background -->
  <rect width="100" height="100" fill="#2a2a2a" rx="10"/>
  
  <!-- Grid lines -->
  <g stroke="#555" stroke-width="1" opacity="0.5">
    <line x1="10" y1="10" x2="90" y2="10"/>
    <line x1="10" y1="25" x2="90" y2="25"/>
    <line x1="10" y1="40" x2="90" y2="40"/>
    <line x1="10" y1="55" x2="90" y2="55"/>
    <line x1="10" y1="70" x2="90" y2="70"/>
    <line x1="10" y1="85" x2="90" y2="85"/>
    <line x1="10" y1="10" x2="10" y2="85"/>
    <line x1="25" y1="10" x2="25" y2="85"/>
    <line x1="40" y1="10" x2="40" y2="85"/>
    <line x1="55" y1="10" x2="55" y2="85"/>
    <line x1="70" y1="10" x2="70" y2="85"/>
    <line x1="85" y1="10" x2="85" y2="85"/>
  </g>

  <!-- Placed blocks - brighter colors -->
  <rect x="10" y="70" width="15" height="15" fill="#FF6B6B" stroke="#FF5252" stroke-width="1"/>
  <rect x="25" y="70" width="15" height="15" fill="#4ECDC4" stroke="#26A69A" stroke-width="1"/>
  <rect x="40" y="70" width="15" height="15" fill="#45B7D1" stroke="#2196F3" stroke-width="1"/>
  <rect x="55" y="70" width="15" height="15" fill="#FFA726" stroke="#FB8C00" stroke-width="1"/>
  <rect x="70" y="70" width="15" height="15" fill="#AB47BC" stroke="#9C27B0" stroke-width="1"/>

  <!-- Falling T-piece - bright orange -->
  <rect x="25" y="25" width="15" height="15" fill="#FF9800" stroke="#FF5722" stroke-width="2"/>
  <rect x="10" y="40" width="15" height="15" fill="#FF9800" stroke="#FF5722" stroke-width="2"/>
  <rect x="25" y="40" width="15" height="15" fill="#FF9800" stroke="#FF5722" stroke-width="2"/>
  <rect x="40" y="40" width="15" height="15" fill="#FF9800" stroke="#FF5722" stroke-width="2"/>
  
  <!-- Glow effect -->
  <rect x="25" y="25" width="15" height="15" fill="none" stroke="#FFD54F" stroke-width="1" opacity="0.7"/>
  <rect x="10" y="40" width="15" height="15" fill="none" stroke="#FFD54F" stroke-width="1" opacity="0.7"/>
  <rect x="25" y="40" width="15" height="15" fill="none" stroke="#FFD54F" stroke-width="1" opacity="0.7"/>
  <rect x="40" y="40" width="15" height="15" fill="none" stroke="#FFD54F" stroke-width="1" opacity="0.7"/>
</svg>
